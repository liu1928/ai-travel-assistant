runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512

env:
  # Firebase Client（瀏覽器端，登入用）— 這些是 public 值，可以放在 yaml
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAaIw9ttGXqxmIaD3q50SrWgbE7lkQQyKQ"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "ai-travel-assistant-20e55.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "ai-travel-assistant-20e55"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:943084790354:web:e126599ec2abeac00fb58b"
    availability:
      - BUILD
      - RUNTIME
  # 住宿訂房連結變現（Stay22 Allez AID，public 值；訂房連結 /allez/roam 會帶此 AID 賺佣金）
  - variable: NEXT_PUBLIC_STAY22_AID
    value: "peanutgogo"
    availability:
      - BUILD
      - RUNTIME
  # AviationStack 端點 base（非 secret；免費方案不支援 https，故用 http）
  # ⚠️ 2026-07-11 換源 AeroDataBox，此變數與下面 AVIATIONSTACK_API_KEY 保留不動（停用備查）
  - variable: AVIATIONSTACK_BASE_URL
    value: "http://api.aviationstack.com/v1"
    availability:
      - RUNTIME
  # 伺服器端 secret（透過 Cloud Secret Manager）
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
  - variable: GOOGLE_MAPS_API_KEY
    secret: GOOGLE_MAPS_API_KEY
  - variable: AVIATIONSTACK_API_KEY
    secret: AVIATIONSTACK_API_KEY
  - variable: AERODATABOX_API_KEY
    secret: AERODATABOX_API_KEY
